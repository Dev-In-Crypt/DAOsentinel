name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Type check + build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/govwatch
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret
      - run: npm test
